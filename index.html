<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- ─── SEO Meta Tags ─────────────────────────────── -->
    <meta
      name="description"
      content="Yendry - Desarrollador Web Full Stack especializado en React, TypeScript y Node.js. Portafolio profesional con proyectos reales de e-commerce, dashboards y APIs."
    />
    <meta name="theme-color" content="#0a0a15" />
    <meta name="author" content="Yendry" />
    <meta
      name="keywords"
      content="desarrollador web, full stack developer, react, typescript, node.js, tailwindcss, portfolio, paginas web, tiendas online, e-commerce"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yendry.dev" />

    <!-- ─── Open Graph / Social Media ──────────────────── -->
    <meta property="og:title" content="Yendry | Desarrollador Web Full Stack" />
    <meta
      property="og:description"
      content="Portafolio profesional de Yendry. Desarrollo web moderno con React, TypeScript y Node.js. Proyectos reales, resultados medibles."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yendry.dev" />
    <meta property="og:image" content="https://yendry.dev/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Yendry | Full Stack Developer" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Yendry | Desarrollador Web Full Stack"
    />
    <meta
      name="twitter:description"
      content="Portafolio profesional de Yendry. Desarrollo web moderno con React, TypeScript y Node.js."
    />
    <meta name="twitter:image" content="https://yendry.dev/og-image.jpg" />

    <title>Yendry | Desarrollador Web Full Stack</title>

    <!-- ─── Preload Critical Resources ──────────────────── -->
    <!-- Preload hero background image -->
    <link
      rel="preload"
      as="image"
      href="/images/1735482116425.jpg"
      fetchpriority="high"
    />
    <!-- Preload CV PDF -->
    <link
      rel="preload"
      as="fetch"
      href="/cv-yendry.pdf"
      crossorigin="anonymous"
    />

    <!-- ─── Fonts Optimizadas ────────────────────────────── -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="dns-prefetch" href="https://api.fontshare.com" />

    <!-- ─── Structured Data (JSON-LD) ────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Yendry",
        "alternateName": "Yendry Dev",
        "jobTitle": "Desarrollador Web Full Stack",
        "description": "Desarrollador Web Full Stack especializado en React, TypeScript y Node.js. Construcción de aplicaciones web modernas, e-commerce y dashboards.",
        "url": "https://yendry.dev",
        "image": "https://yendry.dev/images/1774924704955.png",
        "sameAs": [
          "https://github.com/utrayendry",
          "https://linkedin.com/in/yendry",
          "https://instagram.com/yendry"
        ],
        "knowsAbout": [
          "React",
          "TypeScript",
          "JavaScript",
          "Node.js",
          "TailwindCSS",
          "Next.js",
          "PostgreSQL",
          "MongoDB",
          "GraphQL",
          "REST APIs",
          "Frontend Development",
          "Backend Development",
          "Full Stack Development",
          "E-commerce Development"
        ],
        "makesOffer": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Desarrollo Web Full Stack",
              "description": "Creación de aplicaciones web completas, e-commerce, dashboards y APIs personalizadas."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
